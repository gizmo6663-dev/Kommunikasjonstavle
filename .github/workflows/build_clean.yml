name: Bygg APK (clean)

on:
  workflow_dispatch:   # Kjøres manuelt fra GitHub Actions-fanen

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Bygg APK med Buildozer (Docker, clean)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "pip install cmake==3.28.4 --quiet && \
                buildozer android clean && \
                buildozer android debug 2>&1 | tee /home/user/hostcwd/build.log; \
                exit ${PIPESTATUS[0]}"

      - name: Last opp APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: bin/*.apk
          retention-days: 30

      - name: Last opp bygglogg (alltid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
