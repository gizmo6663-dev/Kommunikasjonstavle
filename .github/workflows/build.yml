name: Build Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Bygg APK med Buildozer (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "
              pip install cmake==3.28.4 --quiet

              # Steg 1: Første bygg – setter opp mappestruktur
              buildozer android debug 2>&1 | tee /home/user/hostcwd/build_step1.log || true

              BASE=/home/user/hostcwd/.buildozer/android/platform/build-arm64-v8a

              # KtWidget.java til javaclasses
              JAVACLASSES=\$BASE/build/javaclasses/kommunikasjonstavle/no/askapp/kommunikasjonstavle
              mkdir -p \$JAVACLASSES
              cp /home/user/hostcwd/java/no/askapp/kommunikasjonstavle/KtWidget.java \$JAVACLASSES/
              echo 'KtWidget.java kopiert OK'

              # kt_widget_info.xml til res/xml
              RESXML=\$BASE/dists/kommunikasjonstavle/src/main/res/xml
              mkdir -p \$RESXML
              printf '%s\n' \
                '<?xml version=\"1.0\" encoding=\"utf-8\"?>' \
                '<appwidget-provider' \
                '    xmlns:android=\"http://schemas.android.com/apk/res/android\"' \
                '    android:minWidth=\"180dp\"' \
                '    android:minHeight=\"110dp\"' \
                '    android:minResizeWidth=\"120dp\"' \
                '    android:minResizeHeight=\"80dp\"' \
                '    android:targetCellWidth=\"3\"' \
                '    android:targetCellHeight=\"2\"' \
                '    android:updatePeriodMillis=\"1800000\"' \
                '    android:resizeMode=\"horizontal|vertical\"' \
                '    android:widgetCategory=\"home_screen\" />' \
                > \$RESXML/kt_widget_info.xml
              echo 'kt_widget_info.xml skrevet OK'

              # Patch AndroidManifest.xml
              MANIFEST=\$BASE/dists/kommunikasjonstavle/src/main/AndroidManifest.xml
              if [ -f \$MANIFEST ]; then
                if grep -q KtWidget \$MANIFEST; then
                  echo 'KtWidget allerede i manifest'
                else
                  sed -i 's|</application>|        <receiver android:name=\"no.askapp.kommunikasjonstavle.KtWidget\" android:exported=\"true\" android:label=\"Dagsrytme\"><intent-filter><action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\" /></intent-filter><meta-data android:name=\"android.appwidget.provider\" android:resource=\"@xml/kt_widget_info\" /></receiver>\n    </application>|' \$MANIFEST
                  echo 'Manifest patchet OK'
                fi
              else
                echo 'ADVARSEL: Manifest ikke funnet'
              fi

              # Steg 2: Andre bygg – Gradle kompilerer med alle filer på plass
              buildozer android debug 2>&1 | tee /home/user/hostcwd/build.log
              exit \${PIPESTATUS[0]}
            "

      - name: Finn APK-fil
        id: find_apk
        if: success()
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Fant APK: $APK"

      - name: Last opp APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Last opp bygglogg
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/build.log
          retention-days: 14
