name: Build Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Cache .buildozer (unntatt p4a-plattform)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer/android/platform/build-arm64-v8a/build
            .buildozer/android/platform/build-arm64-v8a/dists
          key: buildozer-dists-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-dists-${{ runner.os }}-

      - name: Forbered KtWidget FØR Buildozer
        run: |
          # 1. KtWidget.java til javaclasses
          JAVACLASSES=".buildozer/android/platform/build-arm64-v8a/build/javaclasses/kommunikasjonstavle/no/askapp/kommunikasjonstavle"
          mkdir -p "$JAVACLASSES"
          cp java/no/askapp/kommunikasjonstavle/KtWidget.java "$JAVACLASSES/"
          echo "KtWidget.java -> $JAVACLASSES"

          # 2. kt_widget_info.xml til Gradle res/xml/
          RESXML=".buildozer/android/platform/build-arm64-v8a/dists/kommunikasjonstavle/src/main/res/xml"
          mkdir -p "$RESXML"
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<appwidget-provider' \
            '    xmlns:android="http://schemas.android.com/apk/res/android"' \
            '    android:minWidth="180dp"' \
            '    android:minHeight="110dp"' \
            '    android:minResizeWidth="120dp"' \
            '    android:minResizeHeight="80dp"' \
            '    android:targetCellWidth="3"' \
            '    android:targetCellHeight="2"' \
            '    android:updatePeriodMillis="1800000"' \
            '    android:resizeMode="horizontal|vertical"' \
            '    android:widgetCategory="home_screen" />' \
            > "$RESXML/kt_widget_info.xml"
          echo "kt_widget_info.xml -> $RESXML"

          # 3. Patch AndroidManifest.xml
          MANIFEST=".buildozer/android/platform/build-arm64-v8a/dists/kommunikasjonstavle/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q "KtWidget" "$MANIFEST"; then
            sed -i 's|</application>|        <receiver android:name="no.askapp.kommunikasjonstavle.KtWidget" android:exported="true" android:label="Dagsrytme"><intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE" /></intent-filter><meta-data android:name="android.appwidget.provider" android:resource="@xml/kt_widget_info" /></receiver>\n    </application>|' "$MANIFEST"
            echo "Manifest patchet"
          else
            echo "Manifest ikke funnet eller KtWidget allerede der"
          fi

      - name: Bygg APK med Buildozer (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "pip install cmake==3.28.4 --quiet && buildozer android debug 2>&1 | tee /home/user/hostcwd/build.log; exit \${PIPESTATUS[0]}"

      - name: Finn APK-fil
        id: find_apk
        if: success()
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Fant APK: $APK"

      - name: Last opp APK som artefakt
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Last opp bygglogg (alltid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/build.log
          retention-days: 14
