name: Build Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Bygg APK med Buildozer (Docker)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          buildozer_version: stable

      - name: Last opp APK som artefakt
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
