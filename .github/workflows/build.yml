name: Build Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Bygg APK med Buildozer (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "
              set -e
              pip install cmake==3.28.4 --quiet
              cd /home/user/hostcwd

              # Steg 1: Full Buildozer-bygg – setter opp alt
              buildozer android debug 2>&1 | tee build_step1.log || true

              BASE=.buildozer/android/platform/build-arm64-v8a
              DIST=\$BASE/dists/kommunikasjonstavle

              echo '=== INJISERER KTWIDGET ==='

              # Sjekk at dists-mappen eksisterer
              if [ ! -d \$DIST ]; then
                echo 'FEIL: dists-mappen finnes ikke – steg 1 feilet for tidlig'
                cat build_step1.log > build.log
                exit 1
              fi

              # KtWidget.java til src/main/java
              KTDST=\$DIST/src/main/java/no/askapp/kommunikasjonstavle
              mkdir -p \$KTDST
              cp java/no/askapp/kommunikasjonstavle/KtWidget.java \$KTDST/
              echo \"KtWidget.java kopiert: \$(ls \$KTDST)\"

              # kt_widget_info.xml
              # kt_widget_info.xml
              mkdir -p \$DIST/src/main/res/xml
              printf '%s\n' \
                '<?xml version=\"1.0\" encoding=\"utf-8\"?>' \
                '<appwidget-provider' \
                '    xmlns:android=\"http://schemas.android.com/apk/res/android\"' \
                '    android:minWidth=\"180dp\"' \
                '    android:minHeight=\"110dp\"' \
                '    android:minResizeWidth=\"120dp\"' \
                '    android:minResizeHeight=\"80dp\"' \
                '    android:targetCellWidth=\"3\"' \
                '    android:targetCellHeight=\"2\"' \
                '    android:updatePeriodMillis=\"1800000\"' \
                '    android:initialLayout=\"@layout/kt_widget_layout\"' \
                '    android:resizeMode=\"horizontal|vertical\"' \
                '    android:widgetCategory=\"home_screen\" />' \
                > \$DIST/src/main/res/xml/kt_widget_info.xml
              echo 'kt_widget_info.xml OK'

              # kt_widget_layout.xml – egen layout med egne R.id-er
              mkdir -p \$DIST/src/main/res/layout
              printf '%s\n' \
                '<?xml version=\"1.0\" encoding=\"utf-8\"?>' \
                '<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"' \
                '    android:layout_width=\"match_parent\"' \
                '    android:layout_height=\"match_parent\"' \
                '    android:orientation=\"vertical\"' \
                '    android:gravity=\"center_vertical\"' \
                '    android:padding=\"12dp\"' \
                '    android:background=\"#F4F5FA\">' \
                '  <TextView android:id=\"@+id/kt_line1\"' \
                '      android:layout_width=\"match_parent\"' \
                '      android:layout_height=\"wrap_content\"' \
                '      android:textSize=\"13sp\" android:textStyle=\"bold\"' \
                '      android:textColor=\"#12183A\" android:maxLines=\"1\"' \
                '      android:ellipsize=\"end\" />' \
                '  <TextView android:id=\"@+id/kt_line2\"' \
                '      android:layout_width=\"match_parent\"' \
                '      android:layout_height=\"wrap_content\"' \
                '      android:textSize=\"15sp\" android:textColor=\"#4D96FF\"' \
                '      android:maxLines=\"1\" android:ellipsize=\"end\"' \
                '      android:layout_marginTop=\"4dp\" />' \
                '</LinearLayout>' \
                > \$DIST/src/main/res/layout/kt_widget_layout.xml
              echo 'kt_widget_layout.xml OK'

              # Manifest
              MANIFEST=\$DIST/src/main/AndroidManifest.xml
              if ! grep -q KtWidget \$MANIFEST 2>/dev/null; then
                sed -i 's|</application>|        <receiver android:name=\"no.askapp.kommunikasjonstavle.KtWidget\" android:exported=\"true\" android:label=\"Dagsrytme\"><intent-filter><action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\" /></intent-filter><meta-data android:name=\"android.appwidget.provider\" android:resource=\"@xml/kt_widget_info\" /></receiver>\n    </application>|' \$MANIFEST
                echo 'Manifest patchet'
              fi

              echo '=== MANIFEST SJEKK ==='
              grep -c KtWidget \$MANIFEST && echo 'KtWidget i manifest: JA' || echo 'KtWidget i manifest: NEI'

              # Slett alle Gradle-cacher som kan blokkere oppdatering
              rm -rf \$DIST/build/intermediates/merged_manifests
              rm -rf \$DIST/build/intermediates/merged_manifest
              rm -rf \$DIST/build/intermediates/manifest_merge_report
              rm -rf \$DIST/build/tmp/processDebugManifest
              rm -rf \$DIST/build/tmp/processDebugMainManifest
              rm -rf \$DIST/build/intermediates/manifest_for_package
              rm -rf \$DIST/build/intermediates/packaged_manifests
              rm -rf \$DIST/build/tmp/processDebugManifestForPackage
              rm -rf \$DIST/build/intermediates/packaged_res
              rm -rf \$DIST/build/intermediates/processed_res
              rm -rf \$DIST/build/tmp/processDebugResources
              rm -rf \$DIST/build/intermediates/dex
              rm -rf \$DIST/build/intermediates/classes
              rm -rf \$DIST/build/tmp/compileDebugJavaWithJavac
              rm -rf \$DIST/build/tmp/dexBuilderDebug
              echo 'Alle Gradle-cacher slettet (inkl. ManifestForPackage)'

              echo '=== KALLER GRADLE DIREKTE ==='
              cd \$DIST
              chmod +x gradlew
              ./gradlew assembleDebug 2>&1 | tee /home/user/hostcwd/gradle.log
              GRADLE_EXIT=\$?
              echo \"Gradle exit: \$GRADLE_EXIT\"

              cd /home/user/hostcwd

              # Kopier APK til bin/
              APK=\$(find \$DIST/build/outputs/apk/debug -name '*.apk' | head -1)
              if [ -n \"\$APK\" ] && [ \$GRADLE_EXIT -eq 0 ]; then
                mkdir -p bin
                cp \"\$APK\" bin/kommunikasjonstavle-1.2-arm64-v8a-debug.apk
                echo \"APK kopiert: \$(ls bin/)\"
                cat /home/user/hostcwd/gradle.log > build.log
              else
                cat build_step1.log > build.log
                cat /home/user/hostcwd/gradle.log >> build.log
                exit 1
              fi
            "

      - name: Finn APK-fil
        id: find_apk
        if: success()
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Fant APK: $APK"

      - name: Last opp APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Last opp bygglogg
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/build.log
          retention-days: 14
