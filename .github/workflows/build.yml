name: Bygg Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Cache Gradle-avhengigheter
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Sett versjonsnummer fra git
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "code=$COUNT" >> $GITHUB_OUTPUT
          echo "Versjonskode: $COUNT"

      - name: Bygg APK med Buildozer + Gradle (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ~/.gradle:/root/.gradle \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "
              # ── pipefail: enhver feil i en pipeline skal faktisk feile ──
              set -eo pipefail

              pip install cmake==3.28.4 --quiet
              cd /home/user/hostcwd

              # Oppdater versjonskode i spec
              sed -i 's/^version = .*/version = 1.${{ steps.version.outputs.code }}/' buildozer.spec

              # ── PASS 1: la buildozer sette opp dists/ ──
              # Vi tillater feil her, fordi formålet er å bygge dists-mappestrukturen.
              # Hvis selve buildozer-byggekjeden feiler, vil PASS 2 også feile, og
              # det blir fanget der.
              echo '=== PASS 1: buildozer android debug ==='
              buildozer android debug 2>&1 | tee build_step1.log || true

              BASE=.buildozer/android/platform/build-arm64-v8a
              DIST=\$BASE/dists/kommunikasjonstavle

              if [ ! -d \$DIST ]; then
                echo 'FEIL: dists-mappen ble ikke opprettet av buildozer'
                cat build_step1.log > build.log
                exit 1
              fi

              # ── Injiser widget-filer ──
              echo '=== Injiserer widget-filer ==='

              KTDST=\$DIST/src/main/java/no/askapp/kommunikasjonstavle
              mkdir -p \$KTDST
              cp java/no/askapp/kommunikasjonstavle/*.java \$KTDST/
              echo \"Java-filer injisert: \$(ls \$KTDST)\"

              mkdir -p \$DIST/src/main/res/xml
              mkdir -p \$DIST/src/main/res/layout
              cp res/layout/kt_widget_layout.xml \$DIST/src/main/res/layout/

              printf '%s\n' \
                '<?xml version=\"1.0\" encoding=\"utf-8\"?>' \
                '<appwidget-provider' \
                '    xmlns:android=\"http://schemas.android.com/apk/res/android\"' \
                '    android:minWidth=\"180dp\"' \
                '    android:minHeight=\"110dp\"' \
                '    android:minResizeWidth=\"120dp\"' \
                '    android:minResizeHeight=\"80dp\"' \
                '    android:targetCellWidth=\"3\"' \
                '    android:targetCellHeight=\"2\"' \
                '    android:updatePeriodMillis=\"1800000\"' \
                '    android:initialLayout=\"@layout/kt_widget_layout\"' \
                '    android:resizeMode=\"horizontal|vertical\"' \
                '    android:widgetCategory=\"home_screen\" />' \
                > \$DIST/src/main/res/xml/kt_widget_info.xml

              MANIFEST=\$DIST/src/main/AndroidManifest.xml
              if ! grep -q KtWidget \$MANIFEST 2>/dev/null; then
                python3 patch_manifest.py \$MANIFEST
              fi

              # ── Cleanup: tving Gradle til å regenerere alt som avhenger
              #    av Java/manifest/res, OG slett gammel APK så vi aldri kan
              #    plukke opp en stale fil hvis pass 2 feiler. ──
              rm -rf \$DIST/build/outputs/apk
              rm -rf \$DIST/build/intermediates
              rm -rf \$DIST/build/tmp

              # ── PASS 2: Gradle med widget-filer på plass ──
              echo '=== PASS 2: Gradle assembleDebug ==='
              cd \$DIST
              chmod +x gradlew
              ./gradlew assembleDebug --build-cache 2>&1 | tee /home/user/hostcwd/gradle.log
              GRADLE_EXIT=\${PIPESTATUS[0]}

              cd /home/user/hostcwd
              cat build_step1.log  > build.log
              cat gradle.log      >> build.log

              if [ \$GRADLE_EXIT -ne 0 ]; then
                echo \"FEIL: Gradle assembleDebug feilet (exit \$GRADLE_EXIT)\"
                exit \$GRADLE_EXIT
              fi

              APK=\$(find \$DIST/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
              if [ -z \"\$APK\" ]; then
                echo 'FEIL: Ingen APK funnet etter Gradle assembleDebug'
                exit 1
              fi

              # ── Verifiser at FileHelper faktisk finnes i den ferdige APK-en. ──
              # Beskytter mot fremtidige stille feil der bygget lykkes men klassen
              # likevel mangler.
              echo '=== Verifiserer FileHelper i APK ==='
              if ! unzip -p \"\$APK\" classes.dex | strings | grep -q 'no/askapp/kommunikasjonstavle/FileHelper'; then
                echo 'FEIL: FileHelper.class mangler fra classes.dex'
                exit 1
              fi
              echo 'OK: FileHelper er til stede i APK'

              mkdir -p bin
              cp \"\$APK\" bin/
              echo \"APK lagt i bin/: \$(ls bin/)\"
            "

      - name: Finn APK-fil
        id: find_apk
        if: success()
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Fant APK: $APK"

      - name: Last opp APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-v1.${{ steps.version.outputs.code }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Last opp bygglogg (alltid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/build.log
          retention-days: 14
