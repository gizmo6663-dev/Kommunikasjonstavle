name: Build Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Bygg APK med Buildozer (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "
              set -e
              pip install cmake==3.28.4 --quiet
              cd /home/user/hostcwd

              # Steg 1: Sett opp dists-struktur
              buildozer android debug 2>&1 | tee build_step1.log || true

              BASE=.buildozer/android/platform/build-arm64-v8a
              DIST=\$BASE/dists/kommunikasjonstavle

              # Kopier KtWidget.java direkte til Gradle src/main/java
              KTDST=\$DIST/src/main/java/no/askapp/kommunikasjonstavle
              mkdir -p \$KTDST
              cp java/no/askapp/kommunikasjonstavle/KtWidget.java \$KTDST/
              echo \"KtWidget.java -> \$KTDST\"

              # kt_widget_info.xml
              mkdir -p \$DIST/src/main/res/xml
              printf '%s\n' \
                '<?xml version=\"1.0\" encoding=\"utf-8\"?>' \
                '<appwidget-provider' \
                '    xmlns:android=\"http://schemas.android.com/apk/res/android\"' \
                '    android:minWidth=\"180dp\"' \
                '    android:minHeight=\"110dp\"' \
                '    android:minResizeWidth=\"120dp\"' \
                '    android:minResizeHeight=\"80dp\"' \
                '    android:targetCellWidth=\"3\"' \
                '    android:targetCellHeight=\"2\"' \
                '    android:updatePeriodMillis=\"1800000\"' \
                '    android:resizeMode=\"horizontal|vertical\"' \
                '    android:widgetCategory=\"home_screen\" />' \
                > \$DIST/src/main/res/xml/kt_widget_info.xml
              echo 'kt_widget_info.xml skrevet'

              # Manifest-patch
              MANIFEST=\$DIST/src/main/AndroidManifest.xml
              if [ -f \$MANIFEST ] && ! grep -q KtWidget \$MANIFEST; then
                sed -i 's|</application>|        <receiver android:name=\"no.askapp.kommunikasjonstavle.KtWidget\" android:exported=\"true\" android:label=\"Dagsrytme\"><intent-filter><action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\" /></intent-filter><meta-data android:name=\"android.appwidget.provider\" android:resource=\"@xml/kt_widget_info\" /></receiver>\n    </application>|' \$MANIFEST
                echo 'Manifest patchet'
              fi

              # KRITISK: Slett Gradle sin build-cache så den rekompilerer
              rm -rf \$DIST/build
              rm -rf \$DIST/.gradle
              echo 'Gradle cache slettet – tvinger rekompilering'

              # Steg 2: Bygg på nytt – Gradle MÅ rekompilere nå
              buildozer android debug 2>&1 | tee build.log
              exit \${PIPESTATUS[0]}
            "

      - name: Finn APK-fil
        id: find_apk
        if: success()
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Last opp APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Last opp bygglogg
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/build.log
          retention-days: 14
