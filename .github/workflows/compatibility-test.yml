name: Android Kompatibilitetstest

permissions:
  contents: read
  actions: read

on:
  workflow_dispatch:

jobs:
  # ─── Jobb 1: Bygg APK med Docker (samme som build-apk.yml) ───────────────
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      apk-name: ${{ steps.find-apk.outputs.apk-name }}
    
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
      
      - name: Bygg APK med Buildozer (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "pip install cmake==3.28.4 --quiet && buildozer android debug 2>&1 | tee /home/user/hostcwd/build.log; exit \${PIPESTATUS[0]}"
      
      - name: Finn APK-fil
        id: find-apk
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "Feil: Ingen APK funnet i bin/"
            ls -la bin/ || echo "bin/ eksisterer ikke"
            exit 1
          fi
          echo "APK funnet: $APK ($(du -sh $APK | cut -f1))"
          echo "apk-name=$(basename $APK)" >> $GITHUB_OUTPUT
      
      # Lastes opp uten run-id – tilgjengelig for andre jobber i SAMME run
      - name: Last opp APK til deling
        uses: actions/upload-artifact@v4
        with:
          name: apk-for-testing
          path: bin/*.apk
          retention-days: 1
      
      - name: Last opp bygglogg ved feil
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

  # ─── Jobb 2-7: Test på 6 emulatorer parallelt ────────────────────────────
  compatibility-test:
    needs: build-apk
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Moto G-klassen (lavbudsjett, Android 8)
          - api-level: 26
            arch: x86
            profile: Nexus 5
            device-name: moto-g-api26
            label: 'Moto G (API 26)'

          # Sony Xperia 10 (smal 21:9-skjerm)
          - api-level: 28
            arch: x86
            profile: Nexus 5X
            device-name: xperia-10-api28
            label: 'Sony Xperia 10 (API 28)'

          # Samsung Galaxy A-serien
          - api-level: 30
            arch: x86_64
            profile: Nexus 5X
            device-name: galaxy-a-api30
            label: 'Galaxy A-serien (API 30)'

          # Google Pixel 7 (stock Android 13)
          - api-level: 33
            arch: x86_64
            profile: Pixel 4
            device-name: pixel-7-api33
            label: 'Pixel 7 (API 33)'

          # Samsung Galaxy S-flaggskip
          - api-level: 34
            arch: x86_64
            profile: Pixel 4
            device-name: galaxy-s-api34
            label: 'Galaxy S (API 34)'

          # Nettbrett (Galaxy Tab A)
          - api-level: 34
            arch: x86_64
            profile: Pixel C
            device-name: tablet-api34
            label: 'Galaxy Tab A (API 34)'
    
    steps:
      - name: Last ned APK (fra build-apk-jobben i denne run)
        uses: actions/download-artifact@v4
        with:
          name: apk-for-testing
      
      - name: Bekreft APK funnet
        run: |
          echo "Filer i working directory:"
          ls -lah
          APK=$(ls *.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "Feil: Ingen APK funnet!"
            exit 1
          fi
          echo "APK klar: $APK ($(du -sh $APK | cut -f1))"
      
      - name: Kjør emulator og test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          profile: ${{ matrix.profile }}
          avd-name: test-avd-${{ matrix.device-name }}
          emulator-boot-timeout: 600
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 2048
          script: |
            set -e
            
            # Venter på at enheten er klar og låser opp skjermen
            adb wait-for-device
            sleep 5
            adb shell input keyevent 82
            sleep 2

            # Installerer APK (søker etter første .apk-fil)
            APK=$(ls /home/runner/work/Kommunikasjonstavle/Kommunikasjonstavle/*.apk 2>/dev/null | head -1)
            echo "Installerer: $APK"
            adb install -g "$APK"
            sleep 3

            # Rydder logcat og starter opptak
            adb logcat -c
            adb logcat -v time > logcat.txt &
            LOGCAT_PID=$!

            # Starter appen
            adb shell am start -n no.askapp.kommunikasjonstavle/.org.kivy.android.PythonActivity
            sleep 10

            # Stopper logcat
            kill $LOGCAT_PID 2>/dev/null || true

            # Sjekker krasj i logcat
            if grep -q "FATAL EXCEPTION" logcat.txt; then
              echo "FEIL: FATAL EXCEPTION funnet i logcat!"
              grep -A5 "FATAL EXCEPTION" logcat.txt | head -20
              echo '{"passed":0,"crash_detected":1,"ui_element_found":0,"startup_time_seconds":10}' > test_result.json
              exit 1
            fi

            # Sjekker at prosessen lever
            if ! adb shell ps | grep -q "no.askapp.kommunikasjonstavle"; then
              echo "FEIL: App-prosessen ikke funnet!"
              echo '{"passed":0,"crash_detected":0,"ui_element_found":0,"startup_time_seconds":10}' > test_result.json
              exit 1
            fi

            # Dumper UI-hierarki
            adb shell uiautomator dump /sdcard/window_dump.xml
            sleep 1
            adb pull /sdcard/window_dump.xml .

            # Sjekker UI-elementer
            if grep -q "Kommunikasjonstavle\|Rekker\|Hjem\|Dagsplan" window_dump.xml 2>/dev/null; then
              echo "SUKSESS: UI-elementer funnet!"
              echo '{"passed":1,"crash_detected":0,"ui_element_found":1,"startup_time_seconds":10}' > test_result.json
            else
              echo "ADVARSEL: Ingen forventede UI-elementer funnet"
              echo '{"passed":0,"crash_detected":0,"ui_element_found":0,"startup_time_seconds":10}' > test_result.json
              exit 1
            fi

            # Tar skjermbildet
            adb exec-out screencap -p > screenshot_${{ matrix.device-name }}.png
            echo "Screenshot: $(ls -lh screenshot_${{ matrix.device-name }}.png)"
      
      - name: Lagrer screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.device-name }}
          path: screenshot_${{ matrix.device-name }}.png
          if-no-files-found: warn
          retention-days: 7
      
      - name: Lagrer test_result.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.device-name }}
          path: test_result.json
          if-no-files-found: warn
          retention-days: 7

  # ─── Jobb 8: Lager visuell rapport ──────────────────────────────────────
  compatibility-report:
    needs: compatibility-test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Setter opp Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Installerer Pillow
        run: pip install Pillow
      
      - name: Henter testing/-mappen fra repoet
        uses: actions/checkout@v4
        with:
          sparse-checkout: testing
      
      - name: Laster ned alle screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshot-*
          merge-multiple: true
      
      - name: Laster ned alle test-resultater
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
      
      - name: Viser nedlastede filer
        run: ls -la
      
      - name: Kjører frame_screenshots.py
        run: python testing/frame_screenshots.py
      
      - name: Lagrer compatibility-report.png
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: testing/compatibility-report.png
          retention-days: 30
