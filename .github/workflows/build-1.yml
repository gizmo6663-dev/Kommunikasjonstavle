name: Build Kommunikasjonstavle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Forbered KtWidget – kopier til javaclasses FØR Buildozer
        run: |
          JAVACLASSES=".buildozer/android/platform/build-arm64-v8a/build/javaclasses/kommunikasjonstavle/no/askapp/kommunikasjonstavle"
          mkdir -p "$JAVACLASSES"
          cp java/no/askapp/kommunikasjonstavle/KtWidget.java "$JAVACLASSES/"
          echo "KtWidget.java kopiert til: $JAVACLASSES"
          ls -la "$JAVACLASSES/"

      - name: Bygg APK med Buildozer (Docker)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            -c "pip install cmake==3.28.4 --quiet && buildozer android debug 2>&1 | tee /home/user/hostcwd/build.log; exit \${PIPESTATUS[0]}"

      - name: Finn APK-fil
        id: find_apk
        if: success()
        run: |
          APK=$(find ${{ github.workspace }}/bin -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Fant APK: $APK"

      - name: Last opp APK som artefakt
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kommunikasjonstavle-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Last opp bygglogg (alltid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}/build.log
          retention-days: 14
